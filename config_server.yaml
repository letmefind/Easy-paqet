# کانفیگ سرور (سرور B)
# این فایل روی سرور B اجرا می‌شود و نقش سرور اصلی را دارد

# تنظیمات شبکه
network:
  interface: "eth0"  # نام اینترفیس شبکه سرور B را اینجا بذار
  gateway_mac: "00:00:00:00:00:00"  # MAC آدرس روتر سرور B را اینجا بذار

# تنظیمات KCP (پروتکل انتقال سریع و قابل اعتماد)
kcp:
  # سرور روی این آدرس گوش می‌ده
  listen: "0.0.0.0:9999"  # روی همه اینترفیس‌ها و پورت 9999
  # کلید رمزنگاری مشترک (باید با کلاینت یکسان باشه)
  secret: "AY9Frl1VHWJB01lmKqLgE6dJllLhF3Sn4Lw/6BrcyYY="
  # تنظیمات KCP برای عملکرد بهتر
  mode: "fast3"  # حالت fast3 برای سرعت بالا
  mtu: 1350
  sndwnd: 1024
  rcvwnd: 1024
  datashard: 10
  parityshard: 3
  nodelay: 1
  interval: 10
  resend: 2
  nc: 1

# Forwarding - ترافیک رو به کجا بفرسته
forward:
  # ترافیک دریافتی رو به localhost و پورت دلخواهت می‌فرسته
  target: "127.0.0.1:8080"  # پورت دلخواهت رو اینجا بذار (مثلا 8080, 3000, و غیره)

# لاگ‌گیری (اختیاری)
log:
  level: "info"  # می‌تونی info, debug, warn, error بذاری
